<!-- 転送先の設定 -->
<div class="component">
    <label for="dst-address">転送先アドレス：</label>
    <input type="text" id="dst-address" placeholder="転送先のアドレス" onchange="(thisComponent).onChange()" />
    <div style="width:10px;"></div>
    <button id="set-wallet-address-as-dst"
        onclick="(thisComponent).onSetWalletAddressAsDst()">ウォレットアドレスを転送先に設定する</button>
</div>
