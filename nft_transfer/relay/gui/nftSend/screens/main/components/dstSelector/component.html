<!-- 転送先チェーン・NFTコレクションの設定 -->
<div class="component">
    <select id="dst-chain" size="1" onChange="(thisComponent).onChange()">
        <option value="">-- 転送先のチェーンを選択してください --</option>
        <!-- ここに転送先のチェーンの選択肢が追加されます。 -->
    </select>
    <select id="dst-nft-collection" size="1" onChange="(thisComponent).onChange()">
        <option value="">-- 転送先のNFTコレクションを選択してください --</option>
        <!-- ここに転送先のNFTコレクションの選択肢が追加されます。 -->
    </select>
</div>
