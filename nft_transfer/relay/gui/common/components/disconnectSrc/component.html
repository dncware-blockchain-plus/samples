<h1>ウォレット接続解除</h1>

<div class="component">
    <p>本当にウォレットの接続を解除しますか？</p>
</div>

<div class="component">

    <!-- 接続解除の確認ボタン -->
    <button id="disconnect-confirm-button" onclick="(thisComponent).onConfirmDisconnect()">はい</button>

    <!-- スペーサー -->
    <div style="width: 5px"></div>

    <!-- 接続解除のキャンセルボタン -->
    <button id="disconnect-cancel-button" onclick="(thisComponent).onCancelDisconnect()">いいえ</button>
</div>
